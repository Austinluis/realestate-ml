{% extends 'base.html' %}
{% block title %}Sign In — EstateIQ{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="auth-icon-wrap"><i class="bi bi-box-arrow-in-right"></i></div>
      <div class="auth-title">Welcome back</div>
      <div class="auth-subtitle">Log in to your account</div>
    </div>
    <div class="auth-panel">
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="mb-3">
          <label class="field-label">Email</label>
          <div style="position:relative;">
            <i class="bi bi-envelope" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(26,35,50,0.35);font-size:14px;"></i>
            <input type="email" name="email" class="field-input" style="padding-left:36px;" placeholder="you@example.com" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="field-label">Password</label>
          <div style="position:relative;">
            <i class="bi bi-lock" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(26,35,50,0.35);font-size:14px;"></i>
            <input type="password" name="password" class="field-input" style="padding-left:36px;" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn-primary btn-lg w-100" style="justify-content:center;">Log in</button>
      </form>
    </div>
    <div class="auth-footer">Don't have an account? <a href="{% url 'register' %}">Create one</a></div>
  </div>
</div>
{% endblock %}
